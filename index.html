<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نيون شطرنج – Stockfish مع أسهم وظلال الاقتراحات</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at center, #0a0f1a 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ccc;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0.5rem;
            color: #fff;
            text-shadow: 0 0 25px #00aaff, 0 0 10px #0066cc;
            letter-spacing: 2px;
        }
        .main-container {
            display: flex;
            flex-direction: row-reverse;
            align-items: flex-start;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 0.5rem 0;
        }
        .board-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .controls {
            display: flex;
            gap: 0.8rem;
            margin: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        button {
            background: #0a1424;
            color: #e0f0ff;
            border: 2px solid #00aaff;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0,170,255,0.4);
            letter-spacing: 1px;
        }
        button:hover {
            background: #1a3350;
            box-shadow: 0 0 30px #00aaff;
            transform: scale(1.03);
        }
        .difficulty-btn {
            margin: 0.3rem;
        }
        .difficulty-btn.active {
            background: #00aaff;
            color: #000;
            border-color: #00aaff;
            box-shadow: 0 0 25px #00aaff;
        }
        .big-start {
            background: #00aaff;
            color: #000;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.4rem;
            box-shadow: 0 0 35px #00aaff;
            margin: 0.8rem 0;
        }
        #status {
            font-size: 1.3rem;
            margin: 0.5rem;
            padding: 0.6rem 1.8rem;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            text-shadow: 0 0 12px #fff;
            border: 1px solid #00aaff;
            box-shadow: 0 0 20px rgba(0,170,255,0.5);
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        #board-container {
            position: relative;
            display: inline-block;
        }
        .coords-row {
            display: flex;
            justify-content: center;
            height: 25px;
        }
        .coords-col {
            display: flex;
            flex-direction: column;
            width: 30px;
        }
        .coords-row div, .coords-col div {
            color: #aabbcc;
            font-size: 1.1rem;
            font-weight: bold;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #coords-top div {
            width: 66px;
            height: 25px;
            align-items: flex-end;
            padding-bottom: 5px;
            justify-content: flex-start;
            padding-left: 7px;
        }
        #coords-bottom div {
            width: 66px;
            height: 25px;
            align-items: flex-start;
            padding-top: 5px;
            justify-content: flex-start;
            padding-left: 7px;
        }
        #coords-left div {
            width: 30px;
            height: 66px;
            justify-content: flex-end;
            padding-right: 5px;
        }
        #coords-right div {
            width: 30px;
            height: 66px;
            justify-content: flex-start;
            padding-left: 5px;
        }
        .middle-row {
            display: flex;
        }
        #board {
            display: grid;
            grid-template: repeat(8, 66px) / repeat(8, 66px);
            border: 3px solid #00aaff;
            box-shadow: 0 0 50px #00aaff;
            border-radius: 8px;
            overflow: hidden;
            margin: 0;
            position: relative;
            z-index: 1;
        }
        .cell {
            width: 66px;
            height: 66px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: background 0.2s;
        }
        .cell.light { background: #d8c4a8; }
        .cell.dark { background: #8b6f4c; }
        .cell.selected {
            background: #2e7db5 !important;
            box-shadow: inset 0 0 0 5px #00ccff;
        }
        .cell.legal::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
        }
        .cell.capture::after {
            width: 56px;
            height: 56px;
            background: none;
            border: 5px solid rgba(0,0,0,0.5);
            border-radius: 50%;
        }
        .cell.computer-move {
            background: #e6e6fa !important;
            box-shadow: inset 0 0 18px 6px rgba(220,220,255,0.9);
        }
        .piece {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 20px;
            z-index: 2;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-family: 'Segoe UI Symbol', 'Arial Unicode MS', sans-serif;
        }
        .piece.w {
            background: #f5f5f5;
            color: #111;
            box-shadow: 0 0 18px #ffffff;
        }
        .piece.b {
            background: #1a1a1a;
            color: #eee;
            box-shadow: 0 0 18px #00aaff;
        }
        /* طبقة ظلال الاقتراحات */
        .suggestion-highlight {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            border: 3px solid rgba(255, 170, 0, 0.9);
            box-shadow: 0 0 18px rgba(255, 170, 0, 0.7);
            background: rgba(255, 170, 0, 0.25);
            transition: opacity 0.2s;
        }
        .suggestion-highlight.to-square {
            border-color: rgba(255, 140, 0, 0.9);
            background: rgba(255, 140, 0, 0.35);
            box-shadow: 0 0 22px rgba(255, 140, 0, 0.8);
        }
        #suggestion-arrows {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
        }
        #promo-overlay {
            display: none;
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #promo-dialog {
            background: #111c2b;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px #00aaff;
        }
        #promo-dialog button {
            margin: 0.5rem;
            padding: 0.8rem 1.5rem;
            font-size: 1.2rem;
        }
        .opening-name {
            font-size: 0.9rem;
            color: #88ccff;
            font-style: italic;
        }
        #suggestions-panel {
            background: rgba(10, 15, 26, 0.96);
            border: 2px solid #ffaa00;
            border-radius: 16px;
            padding: 1.2rem;
            width: 270px;
            box-shadow: 0 0 35px #ffaa00;
            color: #e0f0ff;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            font-size: 1rem;
            backdrop-filter: blur(5px);
        }
        #suggestions-panel h3 {
            color: #ffcc00;
            text-align: center;
            margin: 0 0 0.2rem;
            font-size: 1.4rem;
            text-shadow: 0 0 15px #ffaa00;
        }
        .suggestion-entry {
            background: rgba(255,170,0,0.08);
            border-radius: 10px;
            padding: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,170,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;

        .suggestion-entry:hover {
            background: rgba(255,170,0,0.25);
            border-color: #ffcc00;

        .suggestion-move {

            color: #fff;
            letter-spacing: 1px;

        }
        .suggestion-eval {

        }
        .suggestion-eval.positive { color: #66ff66; }
        .suggestion-eval.negative { color: #ff6666; }
        #suggestion-btn {
            background: #0a1424;
            color: #ffcc00;

            margin-top: 0.3rem;
            font-size: 0.9rem;
            background: rgba(0,170,255,0.15);
            border-radius: 8px;
            padding: 0.5rem;

            text-align: center;
        }
        .engine-status {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>♛ نيون شطرنج – Stockfish مع أسهم وظلال الاقتراحات ♛</h1>
    <div class="controls">
        <button id="startWhite">⚪ ابدأ (أبيض)</button>
        <button id="startBlack">⚫ ابدأ (أسود)</button>
        <button id="reset">🔄 إعادة</button>
        <button id="undoBtn">↩️ تراجع</button>
        <button id="redoBtn">↪️ إعادة</button>
        <button id="suggestion-btn">💡 اقتراح خارق (Stockfish)</button>
    </div>
    <div style="display:flex; gap:0.5rem; margin:0.5rem;">
        <span style="color:#fff; margin:auto 0;">المستوى:</span>
        <button id="diffEasy" class="difficulty-btn">⚪ سهل</button>
        <button id="diffMedium" class="difficulty-btn active">🟡 متوسط</button>

    </div>
    <button class="big-start" id="bigStart">🚀 بدء المواجهة ضد الخبير</button>
    <div id="status">اختر وضع اللعب <span class="opening-name"></span></div>
    <div class="main-container">
        <div id="suggestions-panel">
            <h3>✨ أفضل النقلات (Stockfish)</h3>
            <div id="suggestions-list"><div style="color:#aaa; text-align:center;">اضغط 💡 لتحليل Stockfish</div></div>
            <div style="font-size:0.7rem; color:#aaa; text-align:center;">تقييم بوحدة البيدق</div>
            <div id="computer-plan" class="computer-plan" style="display:none;"></div>
            <div id="engine-status" class="engine-status"></div>
        </div>
        <div class="board-section">
            <div id="board-container">
                <div id="coords-top" class="coords-row"></div>
                <div class="middle-row">
                    <div id="coords-left" class="coords-col"></div>
                    <div id="board"></div>
                    <div id="coords-right" class="coords-col"></div>
                </div>
                <div id="coords-bottom" class="coords-row"></div>
                <svg id="suggestion-arrows" width="528" height="528" style="position:absolute; top:0; left:0; pointer-events:none;">
                    <defs>
                        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00" />
                        </marker>
                    </defs>
                </svg>
                <div id="suggestion-highlights" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:8;"></div>
            </div>
        </div>
    </div>
    <div id="promo-overlay">
        <div id="promo-dialog">
            <h3>اختر ترقية البيدق</h3>
            <button data-p="queen">👑 وزير</button>
            <button data-p="rook">🏰 قلعة</button>
            <button data-p="bishop">🐘 فيل</button>
            <button data-p="knight">🐎 حصان</button>
        </div>
    </div>

    <script>
        (function() {
            // ========== Opening Trie ==========
            class OpeningTrie {
                constructor() { this.root = {}; this.names = {}; }
                _parseMoves(str) {
                    try { const tokens = str.trim().split(/\s+/); return tokens.filter(t => !t.endsWith('.')); } 
                    catch(e) { return []; }
                }
                insert(movesStr, name, eco='') {
                    const moves = this._parseMoves(movesStr);
                    let node = this.root;
                    for (const m of moves) { if (!node[m]) node[m] = {}; node = node[m]; }
                    this.names[node] = {name, eco};
                }
                find(movesStr) {
                    try {
                        const moves = this._parseMoves(movesStr);
                        let node = this.root, lastName = null, lastEco = null;
                        for (const m of moves) {
                            if (m in node) {
                                node = node[m];
                                if (this.names[node]) { lastName = this.names[node].name; lastEco = this.names[node].eco; }
                            } else break;
                        }
                        return { name: lastName, eco: lastEco };
                    } catch(e) { return {name: null, eco: null}; }
                }
            }

            const openingList = [
                ['', 'Opening Position'],
                ['1. e4', "King's Pawn"], ['1. d4', "Queen's Pawn"],
                ['1. e4 e5 2. Nf3 Nc6 3. Bc4', "Italian Game"],
                ['1. e4 e5 2. Nf3 Nc6 3. Bb5', "Ruy Lopez"],
                ['1. e4 e5 2. Nf3 Nc6 3. d4', 'Scotch Game'],
                ['1. e4 e5 2. Nf3 Nc6 3. Nc3', 'Three Knights'],
                ['1. e4 e5 2. Nf3 Nc6 3. Nc3 Nf6', 'Four Knights'],
                ['1. e4 e5 2. Nf3', "King's Knight"],
                ['1. e4 e5', "Open Game"],
                ['1. e4 e5 2. Nf3 Nc6 3. Bc4 Nf6', 'Two Knights Defense'],
                ['1. e4 e5 2. Nf3 Nc6 3. Bc4 Bc5', 'Giuoco Piano'],
                ['1. e4 e5 2. Nf3 d6', 'Philidor Defense'],
                ['1. e4 e5 2. Nf3 Nf6', "Petrov's Defense"],
                ['1. e4 d5', 'Scandinavian Defense'],
                ['1. e4 c5', 'Sicilian Defense'],
                ['1. e4 e6', 'French Defense'],
                ['1. e4 c6', 'Caro-Kann Defense'],
                ['1. d4 d5 2. c4', "Queen's Gambit"],
                ['1. d4 Nf6', 'Indian Game'],
                ['1. c4', 'English'], ['1. Nf3', 'Réti'],
                ['1. e4 c5 2. Nf3 Nc6 3. d4', 'Open Sicilian'],
                ['1. e4 c5 2. Nf3 e6', 'Sicilian: French Var.'],
                ['1. d4 d5 2. c4 dxc4', "QG Accepted"],
                ['1. d4 d5 2. c4 e6', "QG Declined"],
                ['1. e4 e5 2. f4 exf4', "KG Accepted"],
                ['1. d4 d5', "Closed Game"],
                ['1. e4 e5 2. Nc3', 'Vienna Game'],
                ['1. e4 c5 2. Nc3', 'Closed Sicilian'],
                ['1. d4 d5 2. c4 c6', 'Slav Defense'],
                ['1. e4 d5 2. exd5 Qxd5 3. Nc3 Qa5', 'Scandinavian: Main Line'],
                ['1. e4 e5 2. Bc4', "Bishop's Opening"],
                ['1. e4 e5 2. f4', "King's Gambit"],
                ['1. e3', "Van't Kruijs"], ['1. g3', 'Hungarian'],
                ['1. f4', 'Bird'], ['1. b3', 'Nimzowitsch-Larsen'],
                ['1. d3', 'Mieses'], ['1. b4', 'Orangutan'],
                ['1. e4 d6', 'Pirc Defense'], ['1. e4 g6', 'Modern Defense'],
                ['1. e4 b6', 'Owen Defense'], ['1. e4 Nf6', 'Alekhine Defense'],
                ['1. e4 Nc6', 'Nimzowitsch Defense'],
                ['1. d4 e6', 'Horwitz Defense'], ['1. d4 g6', 'Modern Defense (d4)'],
                ['1. d4 e5', 'Englund Gambit'], ['1. d4 c5', 'Old Benoni Defense']
            ];

            const openingTrie = new OpeningTrie();
            openingList.forEach(([moves, name]) => openingTrie.insert(moves, name));

            // ========== محرك الشطرنج الداخلي ==========
            const DIFFICULTY_TIMES = { easy: 1500, medium: 2500, hard: 4000 };
            let currentDifficulty = 'medium';
            let SEARCH_TIME_PER_MOVE = DIFFICULTY_TIMES[currentDifficulty];
            let suggestionLoading = false;

            const pieceDisplay = {king:'♚',queen:'♛',rook:'♜',bishop:'♝',knight:'♞',pawn:'♟'};
            const START_FEN = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
            let gameHistory = [], positionCount = new Map(), lastComputerMoveHighlight = null;
            let historyStack = [], redoStack = [], lastComputerDepth = 0;
            let moveHistoryStr = [];

            function setDifficulty(level) {
                currentDifficulty = level;
                SEARCH_TIME_PER_MOVE = DIFFICULTY_TIMES[level];
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('diff' + level.charAt(0).toUpperCase() + level.slice(1)).classList.add('active');
            }
            document.getElementById('diffEasy').addEventListener('click', () => setDifficulty('easy'));
            document.getElementById('diffMedium').addEventListener('click', () => setDifficulty('medium'));
            document.getElementById('diffHard').addEventListener('click', () => setDifficulty('hard'));

            function rand64() { return (BigInt(Math.floor(Math.random()*0x10000000)) << 32n) | BigInt(Math.floor(Math.random()*0x100000000)); }
            const Zobrist = {
                pieces: Array(12).fill().map(() => Array(64).fill().map(() => rand64())),
                black: rand64(),
                castling: [rand64(), rand64(), rand64(), rand64()],
                epFile: Array(8).fill().map(() => rand64())
            };
            const pieceIndex = {p:0,n:1,b:2,r:3,q:4,k:5, P:6,N:7,B:8,R:9,Q:10,K:11};
            const pstPawn = [0,0,0,0,0,0,0,0,50,50,50,50,50,50,50,50,10,10,20,30,30,20,10,10,5,5,10,25,25,10,5,5,0,0,0,20,20,0,0,0,5,-5,-10,0,0,-10,-5,5,5,10,10,-20,-20,10,10,5,0,0,0,0,0,0,0,0];
            const pstKnight = [-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-40,-30,-30,-30,-30,-40,-50];
            const pstBishop = [-20,-10,-10,-10,-10,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,10,10,10,10,0,-10,-10,5,5,10,10,5,5,-10,-10,0,5,10,10,5,0,-10,-10,10,10,10,10,10,10,-10,-10,5,0,0,0,0,5,-10,-20,-10,-10,-10,-10,-10,-10,-20];
            const pstRook = [0,0,0,0,0,0,0,0,5,10,10,10,10,10,10,5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,5,5,0,0,0,0,0,0,5,5,0,0,0];
            const pstQueen = [-20,-10,-10,-5,-5,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,5,5,5,0,-10,-5,0,5,5,5,5,0,-5,0,0,5,5,5,5,0,-5,-10,5,5,5,5,5,0,-10,-10,0,5,0,0,0,0,-10,-20,-10,-10,-5,-5,-10,-10,-20];
            const pstKing = [-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-20,-30,-30,-40,-40,-30,-30,-20,-10,-20,-20,-20,-20,-20,-20,-10,20,20,0,0,0,0,20,20,20,30,10,0,0,10,30,20];
            function getPstValue(pt, color, r, c) { let idx = r*8+c; let t; switch(pt){ case 'pawn': t=pstPawn; break; case 'knight': t=pstKnight; break; case 'bishop': t=pstBishop; break; case 'rook': t=pstRook; break; case 'queen': t=pstQueen; break; case 'king': t=pstKing; break; default: return 0; } if(color==='black') idx=63-idx; return t[idx]; }

            function fenToBoard(fen) {
                const parts = fen.split(' '), rows = parts[0].split('/');
                const board = Array(8).fill().map(() => Array(8).fill(null));
                for (let r = 0; r < 8; r++) {
                    let c = 0;
                    for (const ch of rows[r]) {
                        if (ch >= '1' && ch <= '8') c += +ch;
                        else {
                            const color = ch === ch.toUpperCase() ? 'white' : 'black';
                            const type = {p:'pawn', n:'knight', b:'bishop', r:'rook', q:'queen', k:'king'}[ch.toLowerCase()];
                            board[r][c] = {type, color, hasMoved: false};
                            c++;
                        }
                    }
                }
                const turn = parts[1] === 'w' ? 'white' : 'black';
                const castling = {
                    K: parts[2].includes('K'), Q: parts[2].includes('Q'),
                    k: parts[2].includes('k'), q: parts[2].includes('q')
                };
                const ep = parts[3] === '-' ? null : { row: turn === 'white' ? 2 : 5, col: 'abcdefgh'.indexOf(parts[3][0]) };
                return { board, turn, castling, enPassant: ep };
            }

            function hashState(s) {
                let h = 0n;
                const b = s.board;
                for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) if (b[r][c]) {
                    const pc = b[r][c].color === 'white' ? b[r][c].type[0].toUpperCase() : b[r][c].type[0];
                    h ^= Zobrist.pieces[pieceIndex[pc]][r*8+c];
                }
                if (s.turn === 'black') h ^= Zobrist.black;
                if (s.castling.K) h ^= Zobrist.castling[0];
                if (s.castling.Q) h ^= Zobrist.castling[1];
                if (s.castling.k) h ^= Zobrist.castling[2];

                        const p = boardCopy[r][c];
                        if (!p || p.color !== side) continue;
                        if (pieceAttacksSquare(boardCopy, r, c, to[0], to[1])) attackers.push({piece: p, from: [r,c], value: values[p.type]});
                    }
                    if (attackers.length === 0) break;
                    attackers.sort((a,b) => a.value - b.value);
                    const att = attackers[0];
                    gains.push(att.value - gains[gains.length-1]);
                    boardCopy[to[0]][to[1]] = {type: att.piece.type, color: side};
                    boardCopy[att.from[0]][att.from[1]] = null;
                    side = side === 'white' ? 'black' : 'white';
                }
                let score = gains[gains.length-1];
                for (let i = gains.length-2; i >= 0; i--) score = Math.max(0, gains[i] - score);
                return score;
            }

            function isEndgame(board) {
                let queens = 0, rooks = 0, minors = 0;
                for (let r=0;r<8;r++) for (let c=0;c<8;c++) if (board[r][c]) {
                    if (board[r][c].type === 'queen') queens++;
                    else if (board[r][c].type === 'rook') rooks++;
                    else if (board[r][c].type === 'bishop' || board[r][c].type === 'knight') minors++;
                }
                return (queens === 0 && rooks <= 2 && minors <= 2);
            }

            function alphaBeta(state, depth, alpha, beta, ply, nullOk, timeLimit) {
                if (searchStopped || performance.now() - searchStartTime > timeLimit) { searchStopped = true; return 0; }
                const hash = hashState(state), tt = transTable.get(hash);
                if (tt && tt.depth >= depth) {
                    if (tt.flag === EXACT) return tt.score;
                    if (tt.flag === LOWER && tt.score > alpha) alpha = tt.score;
                    if (tt.flag === UPPER && tt.score < beta) beta = tt.score;
                    if (alpha >= beta) return tt.score;
                }
                if (depth <= 0) return quiescence(state, alpha, beta);
                let moves = getLegalMoves(state);
                if (!moves.length) return isKingInCheck(state, state.turn) ? -INF + ply : 0;
                if (nullOk && !isKingInCheck(state, state.turn) && depth >= 3 && !isEndgame(state.board)) {
                    const ns = cloneState(state); ns.turn = state.turn === 'white' ? 'black' : 'white'; ns.enPassant = null;
                    if (-alphaBeta(ns, depth - 1 - 3 - Math.floor(depth/4), -beta, -beta+1, ply+1, false, timeLimit) >= beta) return beta;
                }
                let hashMove = tt?.bestMove || null;
                if (!hashMove && depth >= 4) { alphaBeta(state, depth-2, alpha, beta, ply+1, false, timeLimit); hashMove = transTable.get(hashState(state))?.bestMove; }
                moves.forEach(m => m.score = scoreMove(m, ply, hashMove));
                moves.sort((a,b) => b.score - a.score);
                let best = null, origAlpha = alpha;
                for (let i = 0; i < moves.length; i++) {
                    const move = moves[i], next = makeMove(state, move);
                    const givesCheck = isKingInCheck(next, next.turn);
                    let newDepth = depth - 1 + (givesCheck || (move.piece.type === 'pawn' && (move.to[0] === 0 || move.to[0] === 7)) ? 1 : 0);
                    if (!move.capture && !move.promotion && !givesCheck && newDepth <= 3) {
                        const futilityMargin = 150 + 50 * depth;
                        if (evaluate(state) + futilityMargin <= alpha) continue;
                    }
                    const LMR = !move.capture && !move.promotion && i >= 4 && depth >= 3 && !givesCheck;
                    let score = LMR ? -alphaBeta(next, newDepth-2, -alpha-1, -alpha, ply+1, true, timeLimit) : -alphaBeta(next, newDepth, -beta, -alpha, ply+1, true, timeLimit);
                    if (searchStopped) return 0;
                    if (LMR && score > alpha && score < beta) score = -alphaBeta(next, newDepth, -beta, -alpha, ply+1, true, timeLimit);
                    if (score >= beta) {
                        if (!move.capture && !move.promotion) { killerMoves[ply][1] = killerMoves[ply][0]; killerMoves[ply][0] = {from:[...move.from], to:[...move.to]}; }
                        historyTable.set(move.from+','+move.from[1]+'-'+move.to[0]+','+move.to[1], (historyTable.get(move.from+','+move.from[1]+'-'+move.to[0]+','+move.to[1])||0) + depth*depth);
                        ttStore(hash, {score: beta, depth, flag: LOWER, bestMove: move});
                        return beta;
                    }
                    if (score > alpha) { alpha = score; best = move; }
                }
                ttStore(hash, {score: alpha, depth, flag: alpha > origAlpha ? EXACT : UPPER, bestMove: best});
                return alpha;
            }

            function quiescence(state, alpha, beta) {
                const hash = hashState(state), tt = transTable.get(hash);
                if (tt && tt.depth >= 0) {
                    if (tt.flag === EXACT) return tt.score;
                    if (tt.flag === LOWER && tt.score > alpha) alpha = tt.score;
                    if (tt.flag === UPPER && tt.score < beta) beta = tt.score;
                    if (alpha >= beta) return tt.score;
                }
                const stand = evaluate(state);
                if (stand >= beta) { ttStore(hash, {score: beta, depth: 0, flag: LOWER}); return beta; }
                if (stand > alpha) alpha = stand;
                let moves = generatePseudoMoves(state).filter(m => m.capture || m.promotion);
                moves.sort((a,b) => (b.capture ? pieceValues[b.capture.type] : 0) - (a.capture ? pieceValues[a.capture.type] : 0));
                for (const move of moves) {
                    if (move.capture && !move.promotion) { if (see(state.board, move, state.turn) < -30) continue; }
                    const next = makeMove(state, move);
                    if (isKingInCheck(next, state.turn)) continue;
                    const score = -quiescence(next, -beta, -alpha);
                    if (score >= beta) { ttStore(hash, {score: beta, depth: 0, flag: LOWER}); return beta; }
                    if (score > alpha) alpha = score;
                }
                ttStore(hash, {score: alpha, depth: 0, flag: EXACT});
                return alpha;
            }

            function iterativeDeepening(state, timeLimit, maxDepth = MAX_DEPTH) {
                searchStartTime = performance.now(); searchStopped = false;
                transTable = new Map();
                killerMoves = Array(maxDepth+2).fill().map(() => [null, null]); historyTable = new Map();
                const moves = getLegalMoves(state); let bestMove = moves[0] || null, alpha = -INF, beta = INF, completedDepth = 0;
                for (let d = 1; d <= maxDepth; d++) {
                    if (performance.now() - searchStartTime > timeLimit * 0.9) break;
                    if (d >= 2 && bestMove) { alpha = lastBestScore - 25; beta = lastBestScore + 25; }
                    let score = alphaBeta(state, d, alpha, beta, 0, true, timeLimit);
                    if (searchStopped) break;
                    if (score <= alpha || score >= beta) { alpha = -INF; beta = INF; score = alphaBeta(state, d, alpha, beta, 0, true, timeLimit); if (searchStopped) break; }
                    lastBestScore = score;
                    const entry = transTable.get(hashState(state)); if (entry?.bestMove) bestMove = entry.bestMove;
                    completedDepth = d;
                    if (score > 9000 || score < -9000) break;
                }
                return { move: bestMove, score: lastBestScore, depth: completedDepth };
            }

            function isInsufficientMaterial(board) {
                const pieces = {white:[], black:[]}, bishops = {white:[], black:[]};
                for (let r=0;r<8;r++) for (let c=0;c<8;c++) if (board[r][c]) {
                    const p = board[r][c]; pieces[p.color].push(p.type);
                    if (p.type === 'bishop') bishops[p.color].push((r+c)%2);
                }
                const only = (color, types) => pieces[color].every(t => types.includes(t));
                if (pieces.white.length === 1 && pieces.black.length === 1) return true;
                if (only('white', ['king','knight']) && pieces.black.length === 1) return true;
                if (only('black', ['king','knight']) && pieces.white.length === 1) return true;
                if (only('white', ['king','bishop']) && pieces.black.length === 1) return true;
                if (only('black', ['king','bishop']) && pieces.white.length === 1) return true;
                if (only('white', ['king','bishop']) && only('black', ['king','bishop']) && bishops.white[0] === bishops.black[0]) return true;
                if (only('white', ['king','knight','knight']) && pieces.black.length === 1) return true;
                if (only('black', ['king','knight','knight']) && pieces.white.length === 1) return true;
                return false;
            }

            const openingBook = new Map();
            (function buildBook() {
                const lines = [
                    ['rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq -', 'e2e4', 'e4'],
                    ['rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq -', 'd2d4', 'd4'],
                    ['rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq -', 'g1f3', 'Nf3'],
                ];
                lines.forEach(l => { if (!openingBook.has(l[0])) openingBook.set(l[0], []); openingBook.get(l[0]).push({move:l[1], name:l[2]}); });
            })();

            function boardToFen(s) {
                let fen = '';
                for (let r=0;r<8;r++) {
                    let empty = 0;
                    for (let c=0;c<8;c++) {
                        const p = s.board[r][c];
                        if (!p) empty++;
                        else {
                            if (empty > 0) { fen += empty; empty = 0; }
                            const pieceChar = {king:'k',queen:'q',rook:'r',bishop:'b',knight:'n',pawn:'p'}[p.type];
                            fen += p.color === 'white' ? pieceChar.toUpperCase() : pieceChar;
                        }
                    }
                    if (empty > 0) fen += empty;
                    if (r < 7) fen += '/';
                }
                fen += ' ' + (s.turn === 'white' ? 'w' : 'b') + ' ';
                fen += (s.castling.K ? 'K' : '') + (s.castling.Q ? 'Q' : '') + (s.castling.k ? 'k' : '') + (s.castling.q ? 'q' : '') || '-';
                fen += ' ' + (s.enPassant ? 'abcdefgh'[s.enPassant.col] + (8 - s.enPassant.row) : '-') + ' 0 1';
                return fen;
            }

            function getBookMove(state) {
                const fenKey = boardToFen(state).split(' ').slice(0,4).join(' ');
                const entries = openingBook.get(fenKey);
                if (!entries) return null;
                const entry = entries[Math.floor(Math.random() * entries.length)];
                const fromCol = entry.move.charCodeAt(0)-97, fromRow = 8-parseInt(entry.move[1]);
                const toCol = entry.move.charCodeAt(2)-97, toRow = 8-parseInt(entry.move[3]);
                const moves = getLegalMoves(state);
                for (const m of moves) if (m.from[0]===fromRow&&m.from[1]===fromCol&&m.to[0]===toRow&&m.to[1]===toCol) return {move:m, name:entry.name};
                return null;
            }

            function tryEndgameMate(state) { return null; }
            function updateGameHistory(state) { const h = hashState(state); gameHistory.push(h); positionCount.set(h, (positionCount.get(h)||0)+1); }
            function isRepetitionDraw(state) { return positionCount.has(hashState(state)) && positionCount.get(hashState(state)) >= 2; }

            function getBestMove(state) {
                if (isInsufficientMaterial(state.board)) return null;
                const bookResult = getBookMove(state);
                if (bookResult) { document.querySelector('.opening-name').textContent = '⚡ '+bookResult.name; return bookResult.move; }
                const res = iterativeDeepening(state, SEARCH_TIME_PER_MOVE);
                if (res.move) {
                    lastComputerDepth = res.depth;
                    const next = makeMove(state, res.move);
                    if (isRepetitionDraw(next)) { const alt = getLegalMoves(state).find(m => !isRepetitionDraw(makeMove(state, m))); if (alt) res.move = alt; }
                }
                return res.move;
            }

            // ========== دوال الأسهم والظلال ==========

            // ========== Stockfish Engine ==========
            class StockfishEngine {
                constructor() {
                    try {
                        this.worker = new Worker('stockfish.js');
                    } catch(e) {
                        document.getElementById('engine-status').textContent = '❌ تعذر تحميل stockfish.js. تأكد من وجوده في نفس المجلد وأن الصفحة تعمل على خادم محلي.';
                        return;
                    }
                    this.worker.onmessage = (e) => this.handleMessage(e.data);
                    this.worker.onerror = (e) => {
                        document.getElementById('engine-status').textContent = '❌ خطأ في محرك Stockfish.';
                        console.error(e);
                    };
                    this.isReady = false;
                    this.pendingResolve = null;
                    this.pvs = [];
                    this.send('uci');
                    this.send('setoption name MultiPV value 3');
                    this.send('isready');
                }
                send(command) {
                    if (this.worker) this.worker.postMessage(command);
                }
                handleMessage(line) {
                    console.log('SF:', line);
                    if (line === 'readyok') {
                        this.isReady = true;
                        document.getElementById('engine-status').textContent = '✅ Stockfish جاهز';
                    } else if (line.startsWith('bestmove')) {
                        if (this.pendingResolve) {
                            const result = this.pvs.slice();
                            this.pendingResolve(result);
                            this.pendingResolve = null;
                            this.pvs = [];
                        }
                    } else if (line.startsWith('info') && line.includes(' pv ')) {
                        const depthMatch = line.match(/depth (\d+)/);
                        const scoreMatch = line.match(/score cp (-?\d+)/);
                        const pvMatch = line.match(/ pv (.+)/);
                        if (scoreMatch && pvMatch) {
                            const depth = parseInt(depthMatch?.[1] || '0');
                            const score = parseInt(scoreMatch[1]);
                            const moves = pvMatch[1].trim().split(' ');
                            const bestMove = moves[0];
                            const existing = this.pvs.find(p => p.bestMove === bestMove);
                            if (existing) {
                                if (depth >= existing.depth) {
                                    existing.depth = depth;
                                    existing.score = score;
                                    existing.moves = moves;
                                }
                            } else {
                                this.pvs.push({ depth, score, bestMove, moves });
                            }
                        }
                    }
                }
                analyze(fen, timeMs = 2500) {
                    if (!this.worker) return Promise.resolve([]);
                    this.pvs = [];
                    this.send('ucinewgame');
                    this.send(`position fen ${fen}`);
                    this.send(`go movetime ${timeMs}`);
                    return new Promise(resolve => {
                        this.pendingResolve = resolve;
                        setTimeout(() => {
                            if (this.pendingResolve) {
                                this.pendingResolve(this.pvs);
                                this.pendingResolve = null;
                            }
                        }, timeMs + 500);
                    });
                }
                destroy() {
                    if (this.worker) this.worker.terminate();
                }
            }

            function initStockfish() {

                        }
                        if (!stockfish?.isReady) throw new Error('المحرك غير جاهز');
                    }

                    const fen = boardToFen(gameState);
                    const results = await stockfish.analyze(fen, 2500);
                    if (!results.length) throw new Error('لا توجد نتائج');

                    results.sort((a,b) => b.score - a.score);
                    const unique = [];
                    const seen = new Set();
                    for (const r of results) {

                const flip = playerColor === 'white';
                const files = 'abcdefgh';
                const coordsTop = document.getElementById('coords-top'), coordsBottom = document.getElementById('coords-bottom');
                const coordsLeft = document.getElementById('coords-left'), coordsRight = document.getElementById('coords-right');
                coordsTop.innerHTML = ''; coordsBottom.innerHTML = ''; coordsLeft.innerHTML = ''; coordsRight.innerHTML = '';

                coordsTop.appendChild(document.createElement('div'));
                for (let c = 0; c < 8; c++) {
                    const fileIndex = flip ? 7 - c : c;
                    const div = document.createElement('div'); div.textContent = files[fileIndex]; coordsTop.appendChild(div);
                }
                coordsTop.appendChild(document.createElement('div'));

                for (let r = 0; r < 8; r++) {
                    const rankIndex = flip ? r + 1 : 8 - r;
                    const divL = document.createElement('div'); divL.textContent = rankIndex; coordsLeft.appendChild(divL);
                    const divR = document.createElement('div'); divR.textContent = rankIndex; coordsRight.appendChild(divR);
                }

                coordsBottom.appendChild(document.createElement('div'));
                for (let c = 0; c < 8; c++) {
                    const fileIndex = flip ? 7 - c : c;
                    const div = document.createElement('div'); div.textContent = files[fileIndex]; coordsBottom.appendChild(div);
                }
                coordsBottom.appendChild(document.createElement('div'));

                for (let dr = 0; dr < 8; dr++) {
                    const r = flip ? 7 - dr : dr;
                    for (let c = 0; c < 8; c++) {
                        const cell = document.createElement('div');
                        const isLight = (r + c) % 2 === 0;
                        cell.className = 'cell ' + (isLight ? 'light' : 'dark');
                        if (selectedCell && selectedCell.row === r && selectedCell.col === c) cell.className += ' selected';
                        const lm = legalMovesMap.find(m => m.row === r && m.col === c);
                        if (lm) { cell.className += ' legal'; if (lm.capture) cell.className += ' capture'; }
                        if (lastComputerMoveHighlight && ((r === lastComputerMoveHighlight.fromRow && c === lastComputerMoveHighlight.fromCol) || (r === lastComputerMoveHighlight.toRow && c === lastComputerMoveHighlight.toCol))) {
                            cell.className += ' computer-move';
                        }
                        const piece = gameState.board[r][c];
                        if (piece) {
                            const span = document.createElement('span');
                            span.className = 'piece ' + (piece.color === 'white' ? 'w' : 'b');
                            span.textContent = pieceDisplay[piece.type];
                            cell.appendChild(span);
                        }
                        (function(ir, ic) { cell.addEventListener('click', () => cellClicked(ir, ic)); })(r, c);
                        boardDiv.appendChild(cell);
                    }
                }
            }

            function cellClicked(r, c) {
                if (gameOver || gameState.turn !== playerColor) return;
                if (selectedCell && selectedCell.row === r && selectedCell.col === c) { selectedCell = null; legalMovesMap = []; render(); return; }
                if (selectedCell) {
                    const move = legalMovesMap.find(m => m.row === r && m.col === c);
                    if (move) { executePlayerMove(move); return; }
                    const piece = gameState.board[r][c];
                    if (piece && piece.color === playerColor) setSelected(r, c);
                    else { selectedCell = null; legalMovesMap = []; render(); }
                } else {
                    const piece = gameState.board[r][c];
                    if (piece && piece.color === playerColor) setSelected(r, c);
                }
            }

            function setSelected(r, c) {
                selectedCell = {row: r, col: c};
                legalMovesMap = getLegalMoves(gameState).filter(m => m.from[0] === r && m.from[1] === c).map(m => ({
                    row: m.to[0], col: m.to[1], capture: !!(m.capture || m.enPassant), promotion: m.promotion, fullMove: m
                }));
                render();
            }

            function executePlayerMove(disp) {
                lastComputerMoveHighlight = null;
                const move = disp.fullMove;
                clearHighlightsAndArrows();
                if (move.piece.type === 'pawn' && move.to[0] === 0) {
                    requestPromotion().then(p => {
                        const nm = {...move, promotion: p};
                        gameState = makeMove(gameState, nm); recordMoveSafe(nm); updateGameHistory(gameState);
                        selectedCell = null; legalMovesMap = []; render(); pushSnapshot();
                        if (!checkGameOver()) { gameState.turn = playerColor === 'white' ? 'black' : 'white'; setTimeout(computerMove, 60); }
                    });
                } else {
                    gameState = makeMove(gameState, move); recordMoveSafe(move); updateGameHistory(gameState);
                    selectedCell = null; legalMovesMap = []; render(); pushSnapshot();
                    if (!checkGameOver()) { gameState.turn = playerColor === 'white' ? 'black' : 'white'; setTimeout(computerMove, 60); }
                }
            }

            function executePlayerMoveDirect(move) {
                lastComputerMoveHighlight = null;
                clearHighlightsAndArrows();
                gameState = makeMove(gameState, move); recordMoveSafe(move); updateGameHistory(gameState);
                selectedCell = null; legalMovesMap = []; render(); pushSnapshot();
                if (!checkGameOver()) { gameState.turn = playerColor === 'white' ? 'black' : 'white'; setTimeout(computerMove, 60); }
            }

            function requestPromotion() {
                return new Promise(resolve => {
                    promotionResolve = resolve;
                    document.getElementById('promo-overlay').style.display = 'flex';
                });
            }
            document.getElementById('promo-overlay').addEventListener('click', function(e) {
                if (e.target.dataset.p && promotionResolve) {
                    promotionResolve(e.target.dataset.p);
                    promotionResolve = null;
                    this.style.display = 'none';
                }
            });

            function computerMove() {
                if (gameOver) return;
                const move = getBestMove(gameState);
                if (!move) { gameOver = true; document.getElementById('status').textContent = 'تعادل'; return; }
                gameState = makeMove(gameState, move); recordMoveSafe(move);
                lastComputerMoveHighlight = { fromRow: move.from[0], fromCol: move.from[1], toRow: move.to[0], toCol: move.to[1] };
                updateGameHistory(gameState); render(); pushSnapshot();
                clearHighlightsAndArrows();
                if (!checkGameOver()) {
                    gameState.turn = playerColor;
                    document.getElementById('status').innerHTML = (playerColor === 'white' ? 'دورك (أبيض)' : 'دورك (أسود)') + ` (عمق الحاسوب: ${lastComputerDepth}) <span class="opening-name"></span>`;
                    updateOpeningDisplaySafe();
                }
            }

            function checkGameOver() {
                const moves = getLegalMoves(gameState);
                if (!moves.length) {
                    gameOver = true;
                    document.getElementById('status').textContent = isKingInCheck(gameState, gameState.turn) ? (gameState.turn === playerColor ? 'كش ملك! خسرت!' : 'كش ملك! فزت!') : 'تعادل (ردب)!';
                    return true;
                }
                if (isRepetitionDraw(gameState)) { gameOver = true; document.getElementById('status').textContent = 'تعادل (تكرار)'; return true; }
                if (isInsufficientMaterial(gameState.board)) { gameOver = true; document.getElementById('status').textContent = 'تعادل (نقص مادة)'; return true; }
                return false;
            }

            function undoMove() {
                if (historyStack.length < 3) return;
                gameOver = false;
                redoStack.push({ human: historyStack.pop(), computer: historyStack.pop() });
                restoreFromSnapshot(historyStack[historyStack.length-1]);
                clearHighlightsAndArrows();
                document.getElementById('status').innerHTML = (playerColor === 'white' ? 'دورك (أبيض)' : 'دورك (أسود)') + ' <span class="opening-name"></span>';
                displaySuggestions();
            }

            function redoMove() {
                if (!redoStack.length) return;
                const pair = redoStack.pop();
                historyStack.push(pair.human, pair.computer);
                restoreFromSnapshot(pair.computer);
                clearHighlightsAndArrows();
                document.getElementById('status').innerHTML = (playerColor === 'white' ? 'دورك (أبيض)' : 'دورك (أسود)') + ' <span class="opening-name"></span>';
                displaySuggestions();
            }

            function startGame(asWhite) {
                playerColor = asWhite ? 'white' : 'black';
                gameState = fenToBoard(START_FEN);
                selectedCell = null; legalMovesMap = []; gameOver = false;
                gameHistory = []; positionCount.clear(); moveHistoryStr = [];
                updateGameHistory(gameState); moveCount = 0;
                lastComputerMoveHighlight = null; historyStack = []; redoStack = []; lastComputerDepth = 0;
                pushSnapshot();
                clearHighlightsAndArrows();
                document.getElementById('promo-overlay').style.display = 'none';
                updateOpeningDisplaySafe(); render();
                if (asWhite) {
                    gameState.turn = 'white';
                    document.getElementById('status').innerHTML = 'دورك (أبيض) <span class="opening-name"></span>';
                } else {
                    gameState.turn = 'white';
                    document.getElementById('status').innerHTML = 'الحاسوب يفكر... <span class="opening-name"></span>';
                    setTimeout(computerMove, 250);
                }
            }

            document.getElementById('startWhite').addEventListener('click', () => startGame(true));
            document.getElementById('startBlack').addEventListener('click', () => startGame(false));
            document.getElementById('bigStart').addEventListener('click', () => startGame(true));
            document.getElementById('reset').addEventListener('click', () => {
                playerColor = 'white'; gameState = fenToBoard(START_FEN);
                selectedCell = null; legalMovesMap = []; gameOver = false;
                gameHistory = []; positionCount.clear(); moveHistoryStr = [];
                updateGameHistory(gameState); moveCount = 0;
                lastComputerMoveHighlight = null; historyStack = []; redoStack = []; lastComputerDepth = 0;
                pushSnapshot();
                clearHighlightsAndArrows();
                document.getElementById('status').innerHTML = 'اختر وضع اللعب <span class="opening-name"></span>';
                document.getElementById('suggestions-list').innerHTML = '<div style="color:#aaa;text-align:center;">اضغط 💡 لتحليل Stockfish</div>';
                document.getElementById('computer-plan').style.display = 'none';
                updateOpeningDisplaySafe(); render();
            });
            document.getElementById('undoBtn').addEventListener('click', undoMove);
            document.getElementById('redoBtn').addEventListener('click', redoMove);
            document.getElementById('suggestion-btn').addEventListener('click', displaySuggestions);

            // بدء التشغيل
            historyStack = []; redoStack = []; pushSnapshot(); render();
            initStockfish();
        })();
    </script>
</body>
</html>
